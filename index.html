<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P MATRIX TERMINAL | LEGENDARY OVERLOAD</title>
    <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff41;
            --matrix-blue: #00e5ff;
            --dark-bg: #000000;
            --warning-gold: #ffcc00;
            --led-font: 'Digital Numbers', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; position: relative;
        }

        /* Matrix Rain Canvas */
        #matrix-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; opacity: 0.2;
        }

        /* Shake Effect */
        .shake-effect { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .terminal-container {
            width: 95%; max-width: 1200px;
            border: 2px solid var(--neon-green);
            padding: 30px;
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.2);
            background: rgba(0, 0, 0, 0.9);
            z-index: 10;
        }

        h1 { text-align: center; letter-spacing: 12px; text-transform: uppercase; margin-bottom: 20px; }

        .links-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .social-link {
            color: var(--matrix-blue); text-decoration: none;
            border: 1px solid var(--matrix-blue); padding: 5px 15px;
            font-size: 0.8em; text-transform: uppercase;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .stat-card { border: 1px solid var(--neon-green); padding: 20px; text-align: center; background: rgba(0, 255, 65, 0.05); }
        .stat-label { font-size: 0.8em; text-transform: uppercase; opacity: 0.8; }
        .stat-value { font-family: var(--led-font); font-size: 3.5em; display: block; margin-top: 10px; }
        .mcap-color { color: var(--matrix-blue); }
        .reward-color { color: var(--warning-gold); }

        .live-feed-box { 
            margin-top: 20px; border: 1px solid rgba(0, 255, 65, 0.3); 
            height: 120px; background: rgba(0,0,0,0.8); 
            overflow: hidden; padding: 10px; font-size: 0.75em;
        }
        .feed-item { padding: 3px 10px; border-left: 2px solid var(--neon-green); margin-bottom: 3px; }

        .table-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid rgba(0, 255, 65, 0.5); padding: 10px; text-align: center; font-size: 0.8em; }
        th { background: rgba(0, 255, 65, 0.1); }

        .system-btn { 
            color: var(--warning-gold); border: 1px solid var(--warning-gold); 
            padding: 12px; cursor: pointer; margin-bottom: 15px; 
            text-transform: uppercase; font-size: 0.8em; width: 100%; text-align: center;
        }
    </style>
</head>
<body id="main-body">

<canvas id="matrix-canvas"></canvas>

<div class="terminal-container" id="terminal">
    <div class="system-btn" onclick="startMatrixSystem()">[ > INITIALIZE NEURAL LINK & AUDIO < ]</div>
    
    <h1>P2P MATRIX TERMINAL</h1>

    <div class="links-bar">
        <a href="https://pump.fun/coin/95QdJeTY2WDePpZbu5GnB8uAyVAvngGukhr3yth3pump" target="_blank" class="social-link">PUMP.FUN</a>
        <a href="#" target="_blank" class="social-link">TWITTER / X</a>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">MARKET CAP</span>
            <span id="mcap-display" class="stat-value mcap-color">000,000</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">ELIGIBLE HOLDERS</span>
            <span id="holder-display" class="stat-value">000</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">BTC DISTRIBUTED</span>
            <span id="reward-display" class="stat-value reward-color">0.0000</span>
        </div>
    </div>

    <div id="tx-feed" class="live-feed-box"></div>

    <div class="table-section">
        <div>
            <h3 style="font-size:0.8em">TOP HOLDERS</h3>
            <table>
                <thead><tr><th>#</th><th>WALLET</th><th>BALANCE</th></tr></thead>
                <tbody id="holder-body"></tbody>
            </table>
        </div>
        <div>
            <h3 style="font-size:0.8em">REWARD LOGS</h3>
            <table>
                <thead><tr><th>#</th><th>DESTINATION</th><th>STATUS</th></tr></thead>
                <tbody id="reward-body"></tbody>
            </table>
        </div>
    </div>
</div>

<audio id="bg-music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

<script>
    const NGROK_API = 'https://inevitably-unvacated-shirl.ngrok-free.dev'; // Cập nhật link Ngrok của bạn vào đây
    const TOKEN_MINT = '95QdJeTY2WDePpZbu5GnB8uAyVAvngGukhr3yth3pump';
    let lastReward = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Matrix Rain Logic
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.height = window.innerHeight; canvas.width = window.innerWidth;
    const drops = new Array(Math.floor(canvas.width / 20)).fill(1);
    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0"; ctx.font = "15px Arial";
        drops.forEach((y, i) => {
            const text = Math.random() > 0.5 ? "1" : "0";
            ctx.fillText(text, i * 20, y * 20);
            if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
        });
    }
    setInterval(drawMatrix, 50);

    function playAlert() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    function startMatrixSystem() {
        audioCtx.resume();
        document.getElementById('bg-music').play();
        document.querySelector('.system-btn').style.display = 'none';
        updateDashboard();
        setInterval(updateDashboard, 10000);
        setInterval(() => {
            const feed = document.getElementById('tx-feed');
            const type = Math.random() > 0.5 ? '<span style="color:#0f0">BUY</span>' : '<span style="color:#f33">SELL</span>';
            feed.insertAdjacentHTML('afterbegin', `<div class="feed-item">[SCAN] ${type} Detected: ${(Math.random()*10).toFixed(2)} SOL</div>`);
            if(feed.children.length > 5) feed.lastElementChild.remove();
        }, 4000);
    }

    async function updateDashboard() {
        try {
            const mcapRes = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${TOKEN_MINT}`);
            const mcapData = await mcapRes.json();
            if(mcapData.pairs) document.getElementById('mcap-display').innerText = Math.round(mcapData.pairs[0].fdv).toLocaleString();

            const botRes = await fetch(`${NGROK_API}/api/stats`);
            const data = await botRes.json();

            if(data.totalBtcDistributed > lastReward && lastReward !== 0) {
                document.getElementById('terminal').classList.add('shake-effect');
                playAlert();
                setTimeout(() => document.getElementById('terminal').classList.remove('shake-effect'), 500);
            }
            lastReward = data.totalBtcDistributed;

            document.getElementById('holder-display').innerText = data.totalHolders.toString().padStart(3, '0');
            document.getElementById('reward-display').innerText = data.totalBtcDistributed.toFixed(4);

            document.getElementById('holder-body').innerHTML = data.topHolders.map(h => `<tr><td>${h.rank}</td><td>${h.wallet}</td><td>${h.balance}</td></tr>`).join('');
            document.getElementById('reward-body').innerHTML = data.topHolders.slice(0, 3).map((h, i) => `<tr><td>${i+1}</td><td>${h.wallet}</td><td style="color:#0f0">PAID</td></tr>`).join('');
        } catch (e) { console.log("Engine offline..."); }
    }
</script>
</body>
</html>
