<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$P2P Satoshi Matrix Dashboard</title>
    <style>
        body { 
            background: #050505; 
            color: #00ff41; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        .matrix-card { 
            border: 1px solid #00ff41; 
            padding: 50px; 
            text-align: center; 
            box-shadow: 0 0 20px #00ff41; 
            background: rgba(0, 0, 0, 0.9); 
            min-width: 380px;
            position: relative;
        }
        .glitch-text { 
            font-size: 1.8rem; 
            letter-spacing: 4px; 
            margin-bottom: 20px; 
            text-transform: uppercase;
            font-weight: bold;
        }
        .counter-container {
            margin: 30px 0;
        }
        .label {
            font-size: 0.9rem;
            letter-spacing: 2px;
            opacity: 0.8;
        }
        .counter { 
            font-size: 6rem; 
            margin: 10px 0; 
            color: #fff; 
            text-shadow: 0 0 25px #00ff41; 
        }
        .status-box { 
            font-size: 1rem; 
            color: #008f11; 
            border-top: 1px solid #00ff41;
            padding-top: 20px;
            margin-top: 20px;
        }
        .dot { 
            height: 10px; 
            width: 10px; 
            background: #00ff41; 
            border-radius: 50%; 
            display: inline-block; 
            margin-right: 8px;
            animation: pulse 1.5s infinite; 
        }
        .sync-time {
            margin-top: 15px; 
            font-size: 0.7rem; 
            opacity: 0.5;
        }
        @keyframes pulse { 
            0% { opacity: 1; transform: scale(1); } 
            50% { opacity: 0.2; transform: scale(1.2); } 
            100% { opacity: 1; transform: scale(1); } 
        }
    </style>
</head>
<body>

    <div class="matrix-card">
        <div class="glitch-text">$P2P SATOSHI MATRIX</div>
        
        <div class="counter-container">
            <div class="label">ELIGIBLE HOLDERS</div>
            <div class="counter" id="holder-count">0</div>
        </div>

        <div class="status-box">
            <span class="dot"></span> SYSTEM STATUS: <span id="status">CONNECTING...</span>
        </div>
        
        <div class="sync-time">
            LAST BLOCK SYNC: <span id="time">-</span>
        </div>
    </div>

    <script>
        // LINK NGROK CỦA BẠN ĐÃ ĐƯỢC CẬP NHẬT TẠI ĐÂY
        const NGROK_URL = 'https://inevitably-unvacated-shirl.ngrok-free.dev';

        async function fetchStats() {
            try {
                const response = await fetch(`${NGROK_URL}/api/stats`);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                
                // Cập nhật giao diện
                document.getElementById('holder-count').innerText = data.totalHolders;
                document.getElementById('status').innerText = data.status.toUpperCase();
                document.getElementById('time').innerText = data.lastUpdate;
                document.getElementById('status').style.color = "#00ff41";
            } catch (e) {
                console.error("Fetch error:", e);
                document.getElementById('status').innerText = "SYSTEM OFFLINE";
                document.getElementById('status').style.color = "#ff0000";
            }
        }

        // Tự động cập nhật mỗi 5 giây
        setInterval(fetchStats, 5000); 
        
        // Chạy lần đầu tiên ngay khi load trang
        fetchStats();
    </script>
</body>
</html>
