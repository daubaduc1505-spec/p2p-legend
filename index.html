<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE P2P LEGEND | NEURAL LINK MONITOR</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --p-green: #00ff41; --p-gold: #ffcc00; --p-blue: #00e5ff; --p-red: #ff3131; }
        * { box-sizing: border-box; cursor: crosshair; }
        body { 
            background: #000; color: var(--p-green); font-family: 'VT323', monospace; 
            margin: 0; overflow-x: hidden; position: relative; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* HIỆU ỨNG BITCOIN RƠI */
        .btc-particle {
            position: fixed; top: -50px; width: 32px; height: 32px;
            background-image: url('btc_coin.png'); background-size: contain;
            z-index: 1; animation: fall linear infinite; pointer-events: none;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* KHUNG ĐẾM NGƯỢC SINH NHẬT */
        .header-box { 
            border: 4px double var(--p-gold); padding: 15px; text-align: center; 
            margin-bottom: 20px; background: rgba(0,0,0,0.9); width: 100%; max-width: 900px;
        }
        #timer { font-size: 5vw; color: #fff; display: flex; justify-content: center; gap: 15px; }

        /* GIAO DIỆN CHÍNH */
        .main-ui { border: 1px solid var(--p-green); padding: 20px; width: 100%; max-width: 900px; background: rgba(0,20,0,0.8); z-index: 10; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { border: 1px solid rgba(0,255,65,0.4); padding: 10px; text-align: center; background: rgba(0,0,0,0.5); }
        .stat-val { font-size: 2.2em; color: #fff; display: block; text-shadow: 0 0 10px var(--p-green); }

        /* BẢNG TÍCH LŨY THƯỞNG (PENDING POOL) */
        .pending-box {
            border: 2px dashed var(--p-gold); padding: 15px; margin-bottom: 20px; 
            text-align: center; background: rgba(255,204,0,0.1); border-radius: 8px;
        }
        #p-val { font-size: 2.5em; color: #fff; text-shadow: 0 0 15px var(--p-gold); font-weight: bold; }

        /* FEED LỆNH MUA GIẢ LẬP */
        .feed-box { border: 1px solid rgba(0,255,65,0.3); height: 100px; padding: 10px; overflow: hidden; margin-bottom: 20px; font-size: 1.1em; background: #050505; }
        .feed-item { margin-bottom: 5px; color: #888; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-15px); } }

        /* BẢNG HOLDER 2 CỘT */
        .holder-wrap { border: 1px solid var(--p-gold); padding: 10px; }
        .table-container { display: flex; gap: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.95em; }
        th { color: var(--p-gold); border-bottom: 1px solid var(--p-gold); text-align: left; }
        td { padding: 4px 2px; }
        .addr { color: var(--p-blue); }
    </style>
</head>
<body>

<div class="header-box">
    <div style="color:var(--p-gold); letter-spacing: 2px;">> NEURAL LINK COUNTDOWN TO SATOSHI'S BIRTHDAY</div>
    <div id="timer">00D : 00H : 00M : 00S</div>
</div>

<div class="main-ui">
    <div style="text-align:center; font-size: 2.8em; letter-spacing: 12px; margin-bottom: 15px; font-weight: bold;">THE P2P LEGEND</div>
    
    <div class="stats-grid">
        <div class="stat-card"><span>HOLDERS (REAL)</span><span id="h-val" class="stat-val">0</span></div>
        <div class="stat-card"><span>MARKET CAP</span><span id="m-val" class="stat-val">$0</span></div>
        <div class="stat-card"><span>TOTAL BTC PAID</span><span id="r-val" class="stat-val">0.00000000</span></div>
    </div>

    <div class="pending-box">
        <div style="color: var(--p-gold); font-size: 1.3em; letter-spacing: 1px;">NEXT DISTRIBUTION POOL (ACCUMULATING...)</div>
        <div id="p-val">0.00000000 BTC</div>
        <div style="margin-top: 5px;">TIME REMAINING: <span id="distribute-timer" style="color:var(--p-red); font-weight:bold;">05:00</span></div>
    </div>

    <div id="feed" class="feed-box"></div>

    <div class="holder-wrap">
        <div style="text-align:center; color:var(--p-gold); margin-bottom:10px; font-size: 1.2em;">TOP LEGENDARY HOLDERS</div>
        <div class="table-container">
            <table id="t1"><thead><tr><th>R</th><th>ADDRESS</th><th>BALANCE</th></tr></thead><tbody></tbody></table>
            <table id="t2"><thead><tr><th>R</th><th>ADDRESS</th><th>BALANCE</th></tr></thead><tbody></tbody></table>
        </div>
    </div>
</div>

<script>
    // THAY LINK NGROK CỦA BẠN VÀO ĐÂY
    const API_URL = 'https://inevitably-unvacated-shirl.ngrok-free.dev'; 

    async function syncData() {
        try {
            const res = await fetch(`${API_URL}/api/stats`);
            const data = await res.json();
            
            // Cập nhật số liệu mỗi 5 giây
            document.getElementById('h-val').innerText = data.totalHolders.toLocaleString();
            document.getElementById('m-val').innerText = "$" + Math.floor(data.marketCap).toLocaleString();
            document.getElementById('r-val').innerText = data.btcRewards.toFixed(8);
            
            // Cập nhật quỹ tích lũy
            document.getElementById('p-val').innerText = data.pendingRewards.toFixed(8) + " BTC";

            // Bộ đếm ngược 5 phút
            const mins = Math.floor(data.nextDistributeIn / 60);
            const secs = data.nextDistributeIn % 60;
            document.getElementById('distribute-timer').innerText = 
                `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;

            // Cập nhật bảng 2 cột
            if(data.topHolders && data.topHolders.length > 0) {
                const rows = data.topHolders.map(h => `<tr><td>${h.rank}</td><td class="addr">${h.wallet}</td><td>${h.balance}</td></tr>`);
                document.querySelector('#t1 tbody').innerHTML = rows.slice(0, 5).join('');
                document.querySelector('#t2 tbody').innerHTML = rows.slice(5, 10).join('');
            }
        } catch (e) { console.log("Connecting to P2P Server..."); }
    }

    // Thiết lập cập nhật 5 giây/lần
    setInterval(syncData, 5000); 
    syncData();

    // Bộ đếm ngược Sinh nhật
    setInterval(() => {
        const gap = new Date("April 5, 2026 00:00:00") - new Date();
        const d = Math.floor(gap / 86400000), h = Math.floor((gap % 86400000) / 3600000);
        const m = Math.floor((gap % 3600000) / 60000), s = Math.floor((gap % 60000) / 1000);
        document.getElementById('timer').innerText = `${d}D : ${h}H : ${m}M : ${s}S`;
    }, 1000);

    // Giả lập lệnh mua bán sôi động < $2
    setInterval(() => {
        const f = document.getElementById('feed');
        const amount = (Math.random() * 1.85 + 0.10).toFixed(2);
        const item = document.createElement('div');
        item.className = 'feed-item';
        item.innerHTML = `> [NETWORK SCAN] Wallet SOL_...${Math.random().toString(36).substring(8).toUpperCase()} swapped <span style="color:#ffcc00">$${amount}</span> for P2P LEGEND`;
        f.prepend(item);
        if(f.children.length > 4) f.lastElementChild.remove();
    }, 3500);

    // Hiệu ứng hạt Bitcoin rơi
    setInterval(() => {
        const b = document.createElement('div');
        b.className = 'btc-particle';
        b.style.left = Math.random() * 95 + 'vw';
        b.style.animationDuration = (Math.random() * 2 + 3) + 's';
        document.body.appendChild(b);
        setTimeout(() => b.remove(), 5000);
    }, 500);
</script>
</body>
</html>
