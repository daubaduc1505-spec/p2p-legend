<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P MATRIX TERMINAL | LEGENDARY EDITION</title>
    <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff41;
            --matrix-blue: #00e5ff;
            --dark-bg: #050105;
            --warning-gold: #ffcc00;
            --led-font: 'Digital Numbers', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* Hiệu ứng rung màn hình */
        .shake-effect { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .terminal-container {
            width: 95%; max-width: 1200px;
            border: 2px solid var(--neon-green);
            padding: 30px;
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.2);
            background: rgba(0, 0, 0, 0.9);
        }

        h1 { text-align: center; letter-spacing: 12px; text-transform: uppercase; margin-bottom: 30px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .stat-card { border: 1px solid var(--neon-green); padding: 20px; text-align: center; background: rgba(0, 255, 65, 0.05); }
        .stat-label { font-size: 0.8em; text-transform: uppercase; opacity: 0.8; }
        .stat-value { font-family: var(--led-font); font-size: 3em; display: block; margin-top: 10px; }
        
        .mcap-color { color: var(--matrix-blue); }
        .reward-color { color: var(--warning-gold); }

        .feed-box { margin-top: 20px; border: 1px solid rgba(0, 255, 65, 0.3); height: 120px; background: #000; overflow: hidden; padding: 10px; font-size: 0.8em; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid var(--neon-green); padding: 12px; text-align: center; }
        th { background: rgba(0, 255, 65, 0.2); }

        .system-btn { 
            color: var(--warning-gold); 
            border: 1px solid var(--warning-gold); 
            padding: 10px; cursor: pointer; 
            margin-bottom: 15px; text-transform: uppercase; font-size: 0.7em;
        }
    </style>
</head>
<body id="main-body">

<div class="system-btn" onclick="startSystem()">[ INITIALIZE MATRIX NEURAL LINK ]</div>

<div class="terminal-container" id="terminal">
    <h1>P2P MATRIX TERMINAL</h1>
    
    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">MARKET CAP</span>
            <span id="mcap-display" class="stat-value mcap-color">000,000</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">ELIGIBLE HOLDERS</span>
            <span id="holder-display" class="stat-value">000</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">BTC DISTRIBUTED</span>
            <span id="reward-display" class="stat-value reward-color">0.0000</span>
        </div>
    </div>

    <div id="tx-feed" class="feed-box"></div>

    <table>
        <thead>
            <tr>
                <th>RANK</th>
                <th>LEGENDARY WALLET</th>
                <th>BALANCE</th>
                <th>STATUS</th>
            </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
    </table>
</div>

<audio id="bg-music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

<script>
    const NGROK_API = 'https://inevitably-unvacated-shirl.ngrok-free.dev'; 
    const TOKEN_MINT = '95QdJeTY2WDePpZbu5GnB8uAyVAvngGukhr3yth3pump';
    
    let lastReward = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playAlertSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    function startSystem() {
        audioCtx.resume();
        document.getElementById('bg-music').play();
        document.querySelector('.system-btn').innerText = "[ SYSTEM ONLINE - ENJOY THE MATRIX ]";
        updateDashboard();
    }

    function triggerDistributionEffect() {
        const terminal = document.getElementById('terminal');
        terminal.classList.add('shake-effect');
        playAlertSound();
        setTimeout(() => terminal.classList.remove('shake-effect'), 500);
        
        const feed = document.getElementById('tx-feed');
        feed.insertAdjacentHTML('afterbegin', `<div style="color:var(--warning-gold)">[!] DISTRIBUTION CYCLE DETECTED - BTC REWARDS UPDATED</div>`);
    }

    async function updateDashboard() {
        try {
            // Get DexScreener
            const mcapRes = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${TOKEN_MINT}`);
            const mcapData = await mcapRes.json();
            if(mcapData.pairs) document.getElementById('mcap-display').innerText = Math.round(mcapData.pairs[0].fdv).toLocaleString();

            // Get Bot API
            const botRes = await fetch(`${NGROK_API}/api/stats`);
            const data = await botRes.json();

            // Check for Reward Distribution
            if(data.totalBtcDistributed > lastReward && lastReward !== 0) {
                triggerDistributionEffect();
            }
            lastReward = data.totalBtcDistributed;

            document.getElementById('holder-display').innerText = data.totalHolders.toString().padStart(3, '0');
            document.getElementById('reward-display').innerText = data.totalBtcDistributed.toFixed(4);

            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = data.topHolders.map(h => `
                <tr>
                    <td>${h.rank}</td>
                    <td>${h.wallet}</td>
                    <td>${h.balance}</td>
                    <td style="color:#fff">VERIFIED</td>
                </tr>
            `).join('');

        } catch (e) { console.log("Connecting..."); }
    }

    setInterval(updateDashboard, 10000);
</script>
</body>
</html>
