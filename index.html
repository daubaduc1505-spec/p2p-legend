<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE P2P LEGEND - Daily UTC Reset</title>
    <style>
        body { 
            background: #000; color: #00ff41; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow-x: hidden; position: relative;
        }
        
        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; }

        .terminal-header { font-size: 2.5rem; letter-spacing: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 20px; }

        /* Protocol Information Box */
        .protocol-frame { 
            border: 2px solid #00ff41; padding: 25px; width: 680px; 
            box-shadow: 0 0 15px #00ff41; position: relative; margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.8);
        }
        .protocol-title { text-transform: uppercase; font-size: 1.1rem; margin-bottom: 20px; text-decoration: underline; color: #00ff41; }
        
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 40px; text-align: left; }
        .data-label { font-size: 0.9rem; text-transform: uppercase; font-weight: bold; }
        .data-value { color: #fff; font-weight: bold; }
        
        /* Console Output Logs */
        .console-logs { border-top: 1px solid #00ff41; margin-top: 25px; padding-top: 15px; font-size: 0.8rem; text-align: left; opacity: 0.8; }
        .log-entry { margin-bottom: 5px; font-family: 'Courier New', monospace; }

        /* Main Countdown Section (Daily UTC Reset) */
        .countdown-header { font-size: 1.8rem; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 3px; }
        .countdown-frame { 
            border: 2px solid #00ff41; padding: 20px 40px; width: 680px;
            box-shadow: 0 0 15px #00ff41; display: flex; justify-content: center; align-items: center; margin-bottom: 30px;
            background: rgba(0, 255, 65, 0.05);
        }
        .timer-display { font-size: 3.5rem; color: #fff; font-weight: bold; text-shadow: 0 0 10px #00ff41; }

        /* Action Buttons */
        .action-area { display: flex; gap: 30px; margin-top: 20px; }
        .matrix-btn { 
            border: 1px solid #00ff41; padding: 10px 25px; 
            color: #00ff41; background: transparent; text-transform: uppercase; 
            font-family: 'Courier New', monospace; font-size: 0.9rem; font-weight: bold;
            cursor: pointer; text-decoration: none; display: inline-block;
            transition: all 0.3s ease;
        }
        .matrix-btn:hover { background: #00ff41; color: #000; box-shadow: 0 0 15px #00ff41; }
