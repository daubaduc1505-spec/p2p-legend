<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE P2P LEGEND | SATOSHI BIRTHDAY COUNTDOWN</title>
    <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff41;
            --matrix-blue: #00e5ff;
            --dark-bg: #000000;
            --warning-gold: #ffcc00;
            --led-font: 'Digital Numbers', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; position: relative;
        }

        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; }

        /* Countdown Style */
        .countdown-container {
            width: 95%; max-width: 1100px;
            border: 1px solid var(--warning-gold);
            background: rgba(255, 204, 0, 0.05);
            padding: 15px; text-align: center;
            margin-bottom: 20px; box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
        }
        .countdown-label { font-size: 0.9em; color: var(--warning-gold); letter-spacing: 3px; }
        #timer { font-family: var(--led-font); font-size: 2.2em; color: #fff; margin-top: 5px; text-shadow: 0 0 10px #fff; }

        .terminal-container {
            width: 95%; max-width: 1100px;
            border: 2px solid var(--neon-green);
            padding: 25px; background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
            z-index: 10;
        }

        /* Shake Effect */
        .shake-effect { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        h1 { text-align: center; letter-spacing: 8px; color: var(--neon-green); font-size: 1.8em; margin: 10px 0; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .stat-card { border: 1px solid var(--neon-green); padding: 15px; text-align: center; }
        .stat-value { font-family: var(--led-font); font-size: 3em; display: block; }

        .command-feed { 
            margin-top: 20px; border: 1px solid rgba(0, 255, 65, 0.3); 
            height: 100px; background: #000; overflow: hidden; padding: 10px; font-size: 0.7em;
        }
        .feed-line { padding: 2px 0; border-left: 2px solid var(--neon-green); padding-left: 10px; margin-bottom: 2px; }

        .init-btn { 
            color: var(--warning-gold); border: 2px solid var(--warning-gold); 
            padding: 15px; cursor: pointer; margin-bottom: 20px; 
            text-transform: uppercase; font-weight: bold; width: 100%; text-align: center;
        }

        .links-bar { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .links-bar a { color: var(--matrix-blue); text-decoration: none; font-size: 0.8em; border: 1px solid; padding: 5px 10px; }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div class="countdown-container">
    <div class="countdown-label">COUNTDOWN TO SATOSHI NAKAMOTO'S BIRTHDAY (APRIL 5TH)</div>
    <div id="timer">00D : 00H : 00M : 00S</div>
</div>

<div class="terminal-container" id="terminal">
    <div class="init-btn" onclick="startLegacy()">[ INITIALIZE THE P2P LEGEND PROTOCOL ]</div>
    
    <h1>THE P2P LEGEND</h1>

    <div class="stats-grid">
        <div class="stat-card">
            <span style="font-size:0.7em">MARKET CAP</span>
            <span id="mcap-display" class="stat-value" style="color:var(--matrix-blue)">000,000</span>
        </div>
        <div class="stat-card">
            <span style="font-size:0.7em">ELIGIBLE HOLDERS</span>
            <span id="holder-display" class="stat-value">000</span>
        </div>
        <div class="stat-card">
            <span style="font-size:0.7em">BTC REWARDS</span>
            <span id="reward-display" class="stat-value" style="color:var(--warning-gold)">0.0000</span>
        </div>
    </div>

    <div id="tx-feed" class="command-feed"></div>

    <div class="links-bar">
        <a href="https://pump.fun/coin/95QdJeTY2WDePpZbu5GnB8uAyVAvngGukhr3yth3pump" target="_blank">PUMP.FUN</a>
        <a href="https://x.com" target="_blank">X / TWITTER</a>
    </div>
</div>

<audio id="bgm" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>

<script>
    const NGROK_API = 'https://inevitably-unvacated-shirl.ngrok-free.dev'; // Cập nhật link mới từ Ngrok của bạn
    const TOKEN_MINT = '95QdJeTY2WDePpZbu5GnB8uAyVAvngGukhr3yth3pump';
    let lastBtc = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // 1. Countdown Logic (April 5th)
    function updateCountdown() {
        const now = new Date();
        const year = now.getFullYear();
        let birthday = new Date(`April 5, ${year} 00:00:00`);
        if (now > birthday) birthday = new Date(`April 5, ${year + 1} 00:00:00`);
        
        const diff = birthday - now;
        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const m = Math.floor((diff / 1000 / 60) % 60);
        const s = Math.floor((diff / 1000) % 60);

        document.getElementById('timer').innerText = 
            `${d.toString().padStart(2,'0')}D : ${h.toString().padStart(2,'0')}H : ${m.toString().padStart(2,'0')}M : ${s.toString().padStart(2,'0')}S`;
    }
    setInterval(updateCountdown, 1000);

    // 2. Matrix Rain
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.height = window.innerHeight; canvas.width = window.innerWidth;
    const drops = new Array(Math.floor(canvas.width / 20)).fill(1);
    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0"; ctx.font = "15px monospace";
        drops.forEach((y, i) => {
            const text = Math.random() > 0.5 ? "1" : "0";
            ctx.fillText(text, i * 20, y * 20);
            if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
        });
    }
    setInterval(drawMatrix, 50);

    // 3. System Logic
    function startLegacy() {
        audioCtx.resume();
        document.getElementById('bgm').play();
        document.querySelector('.init-btn').style.display = 'none';
        setInterval(updateStats, 10000);
        setInterval(() => {
            const feed = document.getElementById('tx-feed');
            feed.insertAdjacentHTML('afterbegin', `<div class="feed-line">[P2P] DECRYPTING BLOCK DATA... BUY DETECTED</div>`);
            if(feed.children.length > 4) feed.lastElementChild.remove();
        }, 4000);
    }

    async function updateStats() {
        try {
            const botRes = await fetch(`${NGROK_API}/api/stats`);
            const data = await botRes.json();
            
            // Effect on reward increase
            if(data.totalBtcDistributed > lastBtc && lastBtc !== 0) {
                document.getElementById('terminal').classList.add('shake-effect');
                setTimeout(() => document.getElementById('terminal').classList.remove('shake-effect'), 500);
            }
            lastBtc = data.totalBtcDistributed;

            document.getElementById('holder-display').innerText = data.totalHolders.toString().padStart(3, '0');
            document.getElementById('reward-display').innerText = data.totalBtcDistributed.toFixed(4);
        } catch (e) {}
    }
</script>
</body>
</html>
