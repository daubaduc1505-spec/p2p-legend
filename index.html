<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE P2P LEGEND | BTC Reward Protocol</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; padding: 40px 0; min-height: 160vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }
        .header { font-size: 3rem; letter-spacing: 15px; font-weight: bold; text-shadow: 0 0 20px #00ff41; margin-bottom: 30px; }
        .frame { border: 2px solid #00ff41; padding: 25px; width: 90%; max-width: 800px; box-shadow: 0 0 15px #00ff41; background: rgba(0,0,0,0.9); margin-bottom: 30px; }
        .title { text-transform: uppercase; font-size: 1.1rem; font-weight: bold; color: #00ff41; text-align: center; margin-bottom: 20px; text-decoration: underline; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .val { color: #fff; font-weight: bold; }
        .timer { font-size: 3.5rem; color: #fff; text-shadow: 0 0 15px #00ff41; text-align: center; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid rgba(0,255,65,0.2); text-align: left; }
        .btn-box { display: flex; gap: 20px; margin-top: 20px; }
        .btn { border: 1px solid #00ff41; padding: 12px 25px; color: #00ff41; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: rgba(0,255,65,0.2); box-shadow: 0 0 10px #00ff41; }
        .audio-btn { position: fixed; bottom: 20px; right: 20px; border: 1px solid #00ff41; background: #000; color: #00ff41; padding: 8px 15px; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <audio id="bg-audio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>
    <div class="header">THE P2P LEGEND</div>

    <div class="frame">
        <div class="title">> BTC REWARD PROTOCOL (80/20)</div>
        <div class="grid">
            <div>MIN HOLD:</div><div class="val">> 1,000,000 $P2P</div>
            <div>ELIGIBLE WALLETS:</div><div class="val"><span id="count">0</span></div>
            <div>TOTAL REWARDED:</div><div class="val"><span id="total">0.0452</span> BTC</div>
            <div>PENDING POOL:</div><div class="val" style="color:#f1c40f;">$ <span id="pool">0.00</span></div>
            <div>NEXT AIRDROP:</div><div class="val" style="color:#f1c40f;"><span id="swap-timer">15:00</span></div>
        </div>
    </div>

    <div class="title">> SATOSHI BIRTHDAY COUNTDOWN <</div>
    <div class="frame"><div class="timer" id="main-timer">00d : 00h : 00m : 00s</div></div>

    <div class="title">> TOP 10 LEGENDARY HOLDERS <</div>
    <div class="frame">
        <table>
            <thead><tr><th>Rank</th><th>Wallet</th><th>Balance</th><th style="text-align:right">Status</th></tr></thead>
            <tbody id="leaderboard"></tbody>
        </table>
    </div>

    <div class="btn-box">
        <a href="https://pump.fun" target="_blank" class="btn">BUY $P2P</a>
        <a href="https://x.com/i/communities/2038186875488522599" target="_blank" class="btn" style="border-color:#fff;color:#fff">X COMMUNITY</a>
    </div>

    <button class="audio-btn" onclick="toggleAudio()" id="abtn">🔊 AUDIO: OFF</button>

    <script>
        const API = 'https://inevitably-unvacated-shirl.ngrok-free.dev';
        const TARGET = new Date("April 5, 2026 00:00:00").getTime();
        let sTime = 15 * 60;

        // MATRIX EFFECT
        const c = document.getElementById('matrix-canvas');
        const x = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const drops = Array(Math.floor(c.width/16)).fill(1);
        function draw() {
            x.fillStyle = "rgba(0,0,0,0.05)"; x.fillRect(0,0,c.width,c.height);
            x.fillStyle = "#0F0"; x.font = "16px monospace";
            drops.forEach((y, i) => {
                x.fillText(Math.floor(Math.random()*2), i*16, y*16);
                if (y*16 > c.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);

        function toggleAudio() {
            const a = document.getElementById('bg-audio');
            const b = document.getElementById('abtn');
            if(a.paused) { a.play(); b.innerText = "🔊 AUDIO: ON"; }
            else { a.pause(); b.innerText = "🔇 AUDIO: OFF"; }
        }

        async function sync() {
            try {
                const r = await fetch(`${API}/api/stats`);
                const d = await r.json();
                document.getElementById('count').innerText = d.totalHolders;
                document.getElementById('total').innerText = d.totalBtcDistributed.toFixed(6);
                document.getElementById('pool').innerText = d.pendingPoolUsd.toFixed(2);
                
                const lb = document.getElementById('leaderboard');
                lb.innerHTML = d.topHolders.map((h, i) => `
                    <tr><td>#${i+1}</td><td>${h.address.slice(0,6)}...${h.address.slice(-4)}</td><td>${h.balance.toLocaleString()}</td><td style="text-align:right;color:#f1c40f">ELIGIBLE</td></tr>
                `).join('');
            } catch(e) {}
        }

        setInterval(() => {
            const now = new Date().getTime();
            const diff = TARGET - now;
            if (diff > 0) {
                const days = Math.floor(diff/(1000*60*60*24));
                const hrs = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
                const mins = Math.floor((diff%(1000*60*60))/(1000*60));
                const secs = Math.floor((diff%(1000*60))/1000);
                document.getElementById('main-timer').innerText = `${days}d : ${hrs}h : ${mins}m : ${secs}s`;
            }
            if (sTime > 0) {
                sTime--;
                document.getElementById('swap-timer').innerText = `${Math.floor(sTime/60)}:${(sTime%60).toString().padStart(2,'0')}`;
            } else sTime = 15*60;
        }, 1000);

        setInterval(sync, 10000); sync();
    </script>
</body>
</html>
