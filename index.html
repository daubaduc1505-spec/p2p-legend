<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P MATRIX | LEGENDARY OVERLOAD</title>
    <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff41;
            --matrix-blue: #00e5ff;
            --dark-bg: #000000;
            --warning-gold: #ffcc00;
            --led-font: 'Digital Numbers', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; position: relative;
        }

        /* Hiệu ứng Matrix Rain chạy nền */
        #matrix-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; opacity: 0.25;
        }

        /* Hiệu ứng Rung màn hình khi có thưởng */
        .shake-effect { animation: shake 0.6s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        .terminal-container {
            width: 95%; max-width: 1100px;
            border: 2px solid var(--neon-green);
            padding: 25px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
            background: rgba(0, 0, 0, 0.85);
            z-index: 10;
        }

        .header-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .btn-link {
            color: var(--matrix-blue); text-decoration: none;
            border: 1px solid var(--matrix-blue); padding: 5px 15px;
            font-size: 0.75em; text-transform: uppercase; transition: 0.3s;
        }
        .btn-link:hover { background: var(--matrix-blue); color: #000; box-shadow: 0 0 10px var(--matrix-blue); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .stat-card { border: 1px solid var(--neon-green); padding: 20px; text-align: center; background: rgba(0, 255, 65, 0.03); }
        .stat-value { font-family: var(--led-font); font-size: 3.2em; display: block; margin-top: 10px; }
        
        /* Feed lệnh Mua/Bán sôi động */
        .command-feed { 
            margin-top: 20px; border: 1px solid rgba(0, 255, 65, 0.3); 
            height: 100px; background: rgba(0,0,0,0.9); 
            overflow: hidden; padding: 10px; font-size: 0.7em;
        }
        .feed-line { padding: 2px 5px; border-left: 2px solid var(--neon-green); margin-bottom: 2px; }

        .table-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
        th, td { border: 1px solid rgba(0, 255, 65, 0.4); padding: 10px; text-align: center; }
        th { background: rgba(0, 255, 65, 0.1); color: #fff; text-transform: uppercase; }

        .init-btn { 
            color: var(--warning-gold); border: 2px solid var(--warning-gold); 
            padding: 15px; cursor: pointer; margin-bottom: 20px; 
            text-transform: uppercase; font-weight: bold; width: 100%; text-align: center;
        }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div class="terminal-container" id="main-terminal">
    <div class="init-btn" onclick="activateMatrix()">[ CLICK TO INITIALIZE NEURAL LINK & AUDIO BGM ]</div>
    
    <div class="header-links">
        <a href="https://pump.fun/coin/95QdJeTY2WDePpZbu5GnB8uAyVAvngGukhr3yth3pump" target="_blank" class="btn-link">PUMP.FUN</a>
        <a href="https://x.com" target="_blank" class="btn-link">X / TWITTER</a>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span style="font-size:0.7em">MARKET CAP</span>
            <span id="mcap-display" class="stat-value" style="color:var(--matrix-blue)">000,000</span>
        </div>
        <div class="stat-card">
            <span style="font-size:0.7em">ELIGIBLE HOLDERS</span>
            <span id="holder-display" class="stat-value">000</span>
        </div>
        <div class="stat-card">
            <span style="font-size:0.7em">BTC DISTRIBUTED</span>
            <span id="reward-display" class="stat-value" style="color:var(--warning-gold)">0.0000</span>
        </div>
    </div>

    <div id="tx-feed" class="command-feed"></div>

    <div class="table-section">
        <div>
            <h4 style="margin:5px 0; font-size:0.75em; color:var(--matrix-blue)">LIVE HOLDER SCAN</h4>
            <table>
                <thead><tr><th>RANK</th><th>WALLET</th><th>BALANCE</th></tr></thead>
                <tbody id="holder-table"></tbody>
            </table>
        </div>
        <div>
            <h4 style="margin:5px 0; font-size:0.75em; color:var(--warning-gold)">DISTRIBUTION HISTORY</h4>
            <table>
                <thead><tr><th>ID</th><th>DESTINATION</th><th>STATUS</th></tr></thead>
                <tbody id="reward-table"></tbody>
            </table>
        </div>
    </div>
</div>

<audio id="bgm" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

<script>
    // QUAN TRỌNG: Dán link Ngrok của bạn vào đây
    const NGROK_API = 'https://inevitably-unvacated-shirl.ngrok-free.dev'; 
    const TOKEN_MINT = '95QdJeTY2WDePpZbu5GnB8uAyVAvngGukhr3yth3pump';
    
    let lastRewardCount = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Hiệu ứng Matrix Rain (0 1)
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.height = window.innerHeight; canvas.width = window.innerWidth;
    const drops = new Array(Math.floor(canvas.width / 20)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0"; ctx.font = "15px monospace";
        drops.forEach((y, i) => {
            const text = Math.random() > 0.5 ? "1" : "0";
            ctx.fillText(text, i * 20, y * 20);
            if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
        });
    }
    setInterval(drawMatrix, 50);

    function playBeep() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function activateMatrix() {
        audioCtx.resume();
        document.getElementById('bgm').play();
        document.querySelector('.init-btn').style.display = 'none';
        runEngine();
    }

    function runEngine() {
        updateData();
        setInterval(updateData, 10000);
        // Tạo các dòng lệnh mua bán giả lập cho sinh động
        setInterval(() => {
            const feed = document.getElementById('tx-feed');
            const isBuy = Math.random() < 0.1;
            const color = isBuy ? '#0f0' : '#f33';
            feed.insertAdjacentHTML('afterbegin', `<div class="feed-line">[DECRYPT] <span style="color:${color}">${isBuy?'BUY':'SELL'}</span> order detected: ${(Math.random()*15).toFixed(2)} SOL</div>`);
            if(feed.children.length > 4) feed.lastElementChild.remove();
        }, 3500);
    }

    async function updateData() {
        try {
            // Lấy Market Cap
            const dexRes = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${TOKEN_MINT}`);
            const dexData = await dexRes.json();
            if(dexData.pairs) document.getElementById('mcap-display').innerText = Math.round(dexData.pairs[0].fdv).toLocaleString();

            // Lấy dữ liệu từ Bot v6.0
            const botRes = await fetch(`${NGROK_API}/api/stats`);
            const data = await botRes.json();

            // Hiệu ứng Rung và Bíp khi phần thưởng tăng
            if(data.totalBtcDistributed > lastRewardCount && lastRewardCount !== 0) {
                document.getElementById('main-terminal').classList.add('shake-effect');
                playBeep();
                setTimeout(() => document.getElementById('main-terminal').classList.remove('shake-effect'), 600);
            }
            lastRewardCount = data.totalBtcDistributed;

            document.getElementById('holder-display').innerText = data.totalHolders.toString().padStart(3, '0');
            document.getElementById('reward-display').innerText = data.totalBtcDistributed.toFixed(4);

            // Cập nhật bảng
            document.getElementById('holder-table').innerHTML = data.topHolders.map(h => `<tr><td>${h.rank}</td><td>${h.wallet}</td><td>${h.balance}</td></tr>`).join('');
            document.getElementById('reward-table').innerHTML = data.topHolders.slice(0, 3).map((h, i) => `<tr><td>${i+1}</td><td>${h.wallet}</td><td style="color:#0f0">SUCCESS</td></tr>`).join('');

        } catch (e) { console.error("Neural link unstable..."); }
    }
</script>
</body>
</html>
