<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE P2P LEGEND | SATOSHI NAKAMOTO</title>
    <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff41;
            --matrix-blue: #00e5ff;
            --dark-bg: #000;
            --warning-gold: #ffcc00;
            --led-font: 'Digital Numbers', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 150vh; /* Tăng chiều cao để có thể cuộn */
        }

        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; }

        /* Countdown Nổi Bật */
        .countdown-section {
            width: 100%; max-width: 1000px;
            text-align: center; padding: 30px;
            border: 2px double var(--warning-gold);
            background: rgba(0, 0, 0, 0.9);
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
        }
        .countdown-title { color: var(--warning-gold); font-weight: bold; letter-spacing: 5px; margin-bottom: 15px; font-size: 1.1em; }
        #timer { font-family: var(--led-font); font-size: 3.5em; color: #fff; text-shadow: 0 0 20px #fff; }

        .terminal-container {
            width: 95%; max-width: 1100px;
            border: 1px solid var(--neon-green);
            padding: 25px; background: rgba(0, 0, 0, 0.95);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.1);
        }

        /* Giảm kích thước các số thống kê theo yêu cầu */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin: 20px 0; }
        .stat-card { border: 1px solid rgba(0, 255, 65, 0.3); padding: 15px; text-align: center; }
        .stat-value { font-family: var(--led-font); font-size: 2em; display: block; margin-bottom: 5px; }
        .usd-val { font-size: 0.8em; color: #888; display: block; }

        /* Bảng Holder */
        .holder-section { margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9em; }
        th, td { border: 1px solid rgba(0, 255, 65, 0.3); padding: 12px; text-align: center; }
        th { background: rgba(0, 255, 65, 0.1); color: var(--matrix-blue); }

        .init-btn { 
            color: var(--warning-gold); border: 2px solid var(--warning-gold); 
            padding: 15px; cursor: pointer; margin-bottom: 20px; 
            text-transform: uppercase; font-weight: bold; width: 100%; text-align: center;
        }

        .shake-effect { animation: shake 0.5s both; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-4px);} 75% {transform: translateX(4px);} }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div class="countdown-section">
    <div class="countdown-title">COUNTDOWN TO SATOSHI NAKAMOTO'S BIRTHDAY (APRIL 5TH)</div>
    <div id="timer">00D : 00H : 00M : 00S</div>
</div>

<div class="terminal-container" id="terminal">
    <div class="init-btn" onclick="startSystem()">[ > INITIALIZE P2P LEGEND PROTOCOL < ]</div>
    
    <h1 style="text-align: center; letter-spacing: 10px;">THE P2P LEGEND</h1>

    <div class="stats-grid">
        <div class="stat-card">
            <span style="font-size:0.7em">MARKET CAP (USD)</span>
            <span id="mcap-display" class="stat-value" style="color:var(--matrix-blue)">0</span>
        </div>
        <div class="stat-card">
            <span style="font-size:0.7em">ELIGIBLE HOLDERS</span>
            <span id="holder-display" class="stat-value">000</span>
        </div>
        <div class="stat-card">
            <span style="font-size:0.7em">BTC REWARDS</span>
            <span id="reward-display" class="stat-value" style="color:var(--warning-gold)">0.0000</span>
            <span id="reward-usd" class="usd-val">≈ $0.00 USD</span>
        </div>
    </div>

    <div class="holder-section">
        <h3 style="font-size:0.9em; border-bottom: 1px solid var(--neon-green); padding-bottom: 5px;">TOP 10 LEGENDARY HOLDERS</h3>
        <table>
            <thead><tr><th>#</th><th>WALLET ADDRESS</th><th>BALANCE</th><th>STATUS</th></tr></thead>
            <tbody id="holder-table"></tbody>
        </table>
    </div>

    <div style="margin-top: 30px; text-align: center;">
        <a href="https://pump.fun/coin/95QdJeTY2WDePpZbu5GnB8uAyVAvngGukhr3yth3pump" target="_blank" style="color:var(--matrix-blue); text-decoration:none; border:1px solid; padding:10px;">VIEW ON PUMP.FUN</a>
    </div>
</div>

<audio id="bgm" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>

<script>
    // --- CẤU HÌNH ---
    const NGROK_API = 'https://inevitably-unvacated-shirl.ngrok-free.dev'; // Cần link Ngrok đang chạy
    const TOKEN_MINT = '95QdJeTY2WDePpZbu5GnB8uAyVAvngGukhr3yth3pump';
    let lastBtc = 0;
    const BTC_PRICE_USD = 65000; // Giá BTC giả lập để quy đổi

    // 1. Countdown Logic
    function updateCountdown() {
        const birthday = new Date("April 5, 2026 00:00:00").getTime();
        const now = new Date().getTime();
        const diff = birthday - now;

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById('timer').innerText = 
            `${d.toString().padStart(2,'0')}D : ${h.toString().padStart(2,'0')}H : ${m.toString().padStart(2,'0')}M : ${s.toString().padStart(2,'0')}S`;
    }
    setInterval(updateCountdown, 1000);

    // 2. Matrix Rain
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.height = window.innerHeight; canvas.width = window.innerWidth;
    const drops = new Array(Math.floor(canvas.width / 20)).fill(1);
    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0"; ctx.font = "15px monospace";
        drops.forEach((y, i) => {
            ctx.fillText(Math.random() > 0.5 ? "1" : "0", i * 20, y * 20);
            if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
        });
    }
    setInterval(drawMatrix, 50);

    // 3. Update Logic
    async function updateData() {
        try {
            // Lấy Market Cap thật
            const dexRes = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${TOKEN_MINT}`);
            const dexData = await dexRes.json();
            if(dexData.pairs) {
                document.getElementById('mcap-display').innerText = "$" + Math.round(dexData.pairs[0].fdv).toLocaleString();
            }

            // Lấy dữ liệu từ Bot qua Ngrok
            const botRes = await fetch(`${NGROK_API}/api/stats`);
            const data = await botRes.json();

            // Rung màn hình khi BTC tăng
            if(data.totalBtcDistributed > lastBtc && lastBtc !== 0) {
                document.getElementById('terminal').classList.add('shake-effect');
                setTimeout(() => document.getElementById('terminal').classList.remove('shake-effect'), 500);
            }
            lastBtc = data.totalBtcDistributed;

            document.getElementById('holder-display').innerText = data.totalHolders;
            document.getElementById('reward-display').innerText = data.totalBtcDistributed.toFixed(6);
            document.getElementById('reward-usd').innerText = `≈ $${(data.totalBtcDistributed * BTC_PRICE_USD).toFixed(2)} USD`;

            // Cập nhật Top 10 Holders
            const table = document.getElementById('holder-table');
            table.innerHTML = data.topHolders.slice(0, 10).map(h => `
                <tr>
                    <td>${h.rank}</td>
                    <td style="color:var(--matrix-blue)">${h.wallet}</td>
                    <td>${h.balance}</td>
                    <td style="color:#fff">VERIFIED</td>
                </tr>
            `).join('');

        } catch (e) { console.log("Connecting to Bot..."); }
    }

    function startSystem() {
        document.getElementById('bgm').play();
        document.querySelector('.init-btn').style.display = 'none';
        updateData();
        setInterval(updateData, 10000);
    }
</script>
</body>
</html>
